              schema:
                $ref: '#/components/schemas/Error'
    
    post:
      summary: Create collection for a given user.
      description: |
        Creates a new collection for a given user.

        **Authentication**: User API Key

        **Permission**: 
        - USER: can create collections for their own account.
        - ADMIN: can create collections for any user.

      tags:
        - Collections
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
      requestBody:
        $ref: '#/components/requestBodies/CollectionCreate'
      responses:
        '201':
          description: Collection Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingCollectionWithPricings'
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collections/{organizationId}/bulk:
    post:
      summary: Creates a collection from a list of pricings.
      description: |
        Creates a new collection for a given user from a list of existing pricings.

        **Authentication**: User API Key

        **Permission**: 
        - USER: can create collections for their own account.
        - ADMIN: can create collections for any user.

      tags:
        - Collections
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
      requestBody:
        $ref: '#/components/requestBodies/CollectionBulkCreate'
      responses:
        '201':
          description: Collection Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  collection:
                    $ref: '#/components/schemas/PricingCollection'
                  pricingsWithErrors:
                    type: array
                    items:
                      type: object
                      properties:
                        pricingName:
                          type: string
                        error:
                          type: string
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collections/{organizationId}/pricings:
    post:
      summary: Add pricing to collection.
      description: |
        Adds a pricing to a collection of the user performing the request.

        **Authentication**: User API Key
      
      tags:
        - Pricings
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pricingName:
                  $ref: '#/components/schemas/Name'
                collectionId:
                  type: string
                  description: ID of the collection to add the pricing to
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Pricing added to collection successfully
        '403':
          description: Insufficient permissions
        '404':
          description: Pricing or collection not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collections/{organizationId}/{collectionName}:
    get:
      summary: Get collection details.
      description: |
        Retrieves a collection by name for a given user. If the user requesting is the owner of the collection, they can then access private collections. Otherwise, only public ones.

        **Authentication**: Public

        **Permission**: 
        - UNAUTHENTICATED: can only access PUBLIC collections.
        - USER: can access their own collections (PUBLIC, PRIVATE) and PUBLIC collections of other users.
        - ADMIN: can access any user's collections.

      tags:
        - Collections
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/CollectionName'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingCollection'
        '403':
          description: Insufficient permissions
        '404':
          description: User or collection not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update metadata of a collection.
      description: |
        Updates the metadata of a given collection.

        **Authentication**: User API Key

        **Permission**: 
        - USER: can update their own collections.
        - ADMIN: can update any collection.

      tags:
        - Collections
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/CollectionName'
      requestBody:
        $ref: '#/components/requestBodies/CollectionUpdate'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingCollection'
        '403':
          description: Insufficient permissions
        '404':
          description: User or collection not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a collection.
      description: |
        Deletes a given collection.

        **Authentication**: User API Key

        **Permission**:
        - USER: can delete their own collections.
        - ADMIN: can delete any collection.

      tags:
        - Collections
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/CollectionName'
        - $ref: '#/components/parameters/CollectionCascade'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Collection deleted successfully
        '403':
          description: Insufficient permissions
        '404':
          description: User or collection not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
  /collections/{organizationId}/{collectionName}/download:
    get:
      summary: Download collection.
      description: |
        Downloads a given collection as a zip file containing the text plain YAMLs of the pricings in the collection.

        **Authentication**: Public

        **Permission**:
        - UNAUTHENTICATED: can only download PUBLIC collections. 
        - USER: can download their own collections or PUBLIC ones.
        - ADMIN: can download any collection.

      tags:
        - Collections
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/CollectionName'
      responses:
        '200':
          description: Operation Completed
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '403':
          description: Insufficient permissions
        '404':
          description: User or collection not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collections/{organizationId}/{collectionName}/pricings/{pricingName}:
    delete:
      summary: Remove a pricing from a collection.
      description: |
        Removes a pricing from the specified collection.

        **Authentication**: User API Key

        **Permission**:
        - USER: can remove pricings from their own collections.
        - ADMIN: can remove pricings from any collection.

        The `collectionName` path parameter must match the collection that contains the pricing, otherwise the endpoint returns 404.

      tags:
        - Collections
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/CollectionName'
        - $ref: '#/components/parameters/PricingName'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Pricing removed from collection successfully
        '403':
          description: Insufficient permissions
        '404':
          description: Pricing or collection not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cache:
    get:
      summary: Retrieve a value from cache
      description: |
        Retrieves a cached value by key from the Redis cache.
        The value is returned as-is from the cache. If the key does not exist,
        returns null.

        **Authentication**: (only if client is sphere frontend, otherwise requires ADMIN role)

      tags:
        - Cache
      security:
        - ApiKeyAuth: []
      parameters:
        - name: key
          in: query
          required: true
          description: The cache key to retrieve
          schema:
            type: string
            example: "user_preferences_123"
      responses:
        '200':
          description: Successfully retrieved the cached value
          content:
            application/json:
              schema:
                $ref: '#/components/responses/CacheGetResponse'
        '400':
          description: Missing or invalid cache key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Cache key is required"
        '500':
          description: Redis client not initialized or internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "ERROR: Redis client not initialized"
                
    post:
      summary: Store a value in cache
      description: |
        Stores a value in the Redis cache with an optional expiration time.
        By default, cached values expire after 300 seconds (5 minutes) if no 
        expiration time is specified.

        **Important**: This endpoint enforces a conflict prevention mechanism.
        If a key already exists in the cache with a different value, the operation
        will fail with a CONFLICT error. Use a different key to store a new value.

        **Authentication**: Public (only if client is sphere frontend, otherwise requires ADMIN role)

      tags:
        - Cache
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/requestBodies/CacheSetRequest'
      responses:
        '200':
          description: Value successfully stored in cache
          content:
            application/json:
              schema:
                $ref: '#/components/responses/CacheSetResponse'
        '400':
          description: Missing or invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Cache key and value are required"
        '409':
          description: Conflict - value already exists for this key with a different value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "CONFLICT: Value already exists in cache, please use a different key."
        '500':
          description: Redis client not initialized or internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "ERROR: Redis client not initialized"

components:
  schemas:

    # ------------------------------
    # --          FIELDS          --
    # ------------------------------

    ApiToken:
      type: string
      description: User API token for authentication in subsequent requests
      example: 9f3a7c2b1e8d4a6f0c5b2e9a7d1f3c8b4a6e2d1c

    Username:
      type: string
      description: Unique username for the user
      example: johndoe
      minLength: 3
      maxLength: 30
      pattern: '^[a-zA-Z0-9_]+$'

    LoginField:
      type: string
      description: Username or email of the user
      example: johndoe | john.doe@example.com
      minLength: 3
      maxLength: 80

    Password:
      type: string
      description: Password of the user
      example: j0hnD03
      minLength: 5

    Role:
      type: string
      description: Role of the user
      enum: [ADMIN, USER]
      example: USER

    Date:
      type: string
      format: date-time
      description: Date in UTC
      example: '2025-12-31T00:00:00Z'

    ObjectId:
      type: string
      description: ObjectId of the corresponding MongoDB document
      example: 68050bd09890322c57842f6f
      pattern: '^[a-f0-9]{24}$'
      readOnly: true
    
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    
    Name:
      type: string
      description: Name of an entity (e.g. pricing definition name)
      example: Zoom

    SortByPricings:
      type: string
      description: Field to sort pricings by
      enum: [name, configurationSpaceSize, featuresCount, usageLimitsCount, plansCount, addOnsCount, minPrice, maxPrice]
      example: name
    
    SortByCollections:
      type: string
      description: Field to sort collections by
      enum: [name, numberOfPricings, configurationSpaceSize, numberOfFeatures, numberOfPlans, numberOfAddOns]
      example: name
    
    Sort:
      type: string
      description: Sort order for listing endpoints. Will take "desc" as value by default.
      enum: [asc, desc]
      example: asc

    MinSubscription:
      type: number
      description: Minimum subscription price for a pricing (used for sorting and filtering)
      example: 9.99

    MaxSubscription:
      type: number
      description: Maximum subscription price for a pricing (used for sorting and filtering)
      example: 99.99

    MinMinPrice:
      type: number
      description: Minimum price for a pricing's cheapest subscription (used for sorting and filtering)
      example: 4.99

    MaxMinPrice:
      type: number
      description: Maximum price for a pricing's cheapest subscription (used for sorting and filtering)
      example: 99.99

    MinMaxPrice:
      type: number
      description: Minimum price for a pricing's most expensive subscription (used for sorting and filtering)
      example: 19.99

    MaxMaxPrice:
      type: number
      description: Maximum price for a pricing's most expensive subscription (used for sorting and filtering)
      example: 199.99

    SelectedOwners:
      type: array
      description: List of selected pricing definition owners for filtering
      items:
        type: string
      example: ["agarcia29", "john_doe", "sphere"]

    Limit:
      type: number
      description: A numeric limit value for a list provided by a GET request
      example: 100
    
    Offset:
      type: number
      description: A numeric offset value for a list provided by a GET request
      example: 2



    # ------------------------------
    # --           USERS          --
    # ------------------------------

    PublicUser:
      type: object
      required:
        - username
        - avatar
      properties:
        username:
          type: string
        avatar:
          type: string
          nullable: true
          description: URI to the user's avatar (processed)

    User:
      type: object
      required:
        - username
        - avatar
        - role
        - firstName
        - lastName
        - email
        - createdAt
        - updatedAt
      properties:
        username:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
          description: URI to the user's avatar (processed)
        address:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        token:
          type: string
          nullable: true
        tokenExpiration:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ------------------------------
    # --         PRICINGS         --
    # ------------------------------

    MetricHistogram:
      type: object
      properties:
        min:
          type: number
        max:
          type: number
        data:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
                description: Histogram range value
                example: "0-10"
              count: 
                type: integer
                description: Number of pricings that fall into this range
                example: 15

    Pricing:
      type: object
      properties:
        name:
          type: string
        owner:
          type: string
        collectionName:
          type: string
          description: Name of the pricing collection to which this pricing belongs
          example: "MyCollection"
        version:
          type: string
          description: Any string representing the version of the pricing definition (e.g. "1.0", "2.1.3", "2024-09-30")
          example: "1.0.0"
        createdAt:
          $ref: '#/components/schemas/Date'
        currency:
          type: string
          description: ISO 4217 currency code for the pricing definition
          example: "USD"
        analytics:
          type: object
          nullable: true
          properties:
            numberOfFeatures:
              type: integer
              example: 10
            numberOfPlans:
              type: integer
              example: 3
            numberOfAddOns:
              type: integer
              example: 2
            configurationSpaceSize:
              type: number
              example: 120
            minSubscriptionPrice:
              type: number
              example: 9.99
            maxSubscriptionPrice:
              type: number
              example: 199.99

    PricingDetails:
      type: object
      properties:
        name:
          type: string
          description: Common name of all pricing versions
        collectionName:
          type: string
          description: Name of the pricing collection to which this pricing belongs
          example: "MyCollection"
        versions:
          type: array
          description: List of all versions of the pricing definition with their details
          items:
            $ref: '#/components/schemas/PricingVersion'

    PricingVersion:
      type: object
      properties:
        id:
          type: string
        version:
          type: string
          description: Any string representing the version of the pricing definition (e.g. "1.0", "2.1.3", "2024-09-30")
          example: "1.0.0"
        private:
          type: boolean
          default: false
        collectionName:
          type: string
          description: Name of the pricing collection to which this pricing belongs
          example: "MyCollection"
        createdAt:
          $ref: '#/components/schemas/Date'
        url:
          type: string
          format: uri
          nullable: true
        yaml:
          type: string
          description: Path of serialized pricing definition in YAML format
          example: "/pricings/zoom_1.0.0.yaml"
        owner:
          type: object
          properties:
            id:
              type: string
            username:
              type: string
              example: "john_doe"
        analytics:
          type: object
          nullable: true
          properties:
            numberOfFeatures:
              type: integer
            numberOfInformationFeatures:
              type: integer
            numberOfIntegrationFeatures:
              type: integer
            numberOfIntegrationApiFeatures:
              type: integer
            numberOfIntegrationExtensionFeatures:
              type: integer
            numberOfIntegrationIdentityProviderFeatures:
              type: integer
            numberOfIntegrationWebSaaSFeatures:
              type: integer
            numberOfIntegrationMarketplaceFeatures:
              type: integer
            numberOfIntegrationExternalDeviceFeatures:
              type: integer
            numberOfDomainFeatures:
              type: integer
            numberOfAutomationFeatures:
              type: integer
            numberOfBotAutomationFeatures:
              type: integer
            numberOfFilteringAutomationFeatures:
              type: integer
            numberOfTrackingAutomationFeatures:
              type: integer
            numberOfTaskAutomationFeatures:
              type: integer
            numberOfManagementFeatures:
              type: integer
            numberOfGuaranteeFeatures:
              type: integer
            numberOfSupportFeatures:
              type: integer
            numberOfPaymentFeatures:
              type: integer
            numberOfUsageLimits:
              type: integer
            numberOfRenewableUsageLimits:
              type: integer
            numberOfNonRenewableUsageLimits:
              type: integer
            numberOfResponseDrivenUsageLimits:
              type: integer
            numberOfTimeDrivenUsageLimits:
              type: integer
            numberOfPlans:
              type: integer
            numberOfFreePlans:
              type: integer
            numberOfPaidPlans:
              type: integer
            numberOfAddOns:
              type: integer
            numberOfReplacementAddons:
              type: integer
            numberOfExtensionAddons:
              type: integer
            configurationSpaceSize:
              type: number
            minSubscriptionPrice:
              type: number
            maxSubscriptionPrice:
              type: number
    
    PricingConfigurationSpace:
      type: object
      properties:
        configurationSpace:
          type: array
          items:
            $ref: '#/components/schemas/PricingConfiguration'
        configurationSpaceSize:
          type: number
          description: Total number of possible configurations in the configuration space
          example: 120
    
    PricingConfiguration:
      type: object
      properties:
        selectedPlan:
          type: string
          description: Name of the selected plan in the configuration
          example: "GOLD"
        selectedAddOns:
          type: array
          items:
            type: string
          description: List of names of the selected add-ons in the configuration
          example: ["Extra Storage", "Premium Support"]
        subscriptionFeatures:
          type: array
          items:
            type: string
          description: List of names of the selected features in the configuration
          example: ["Feature A", "Feature B", "Feature C"]
        subscriptionUsageLimits:
          type: array
          items:
            type: string
          description: List of names of the selected usage limits in the configuration
          example: ["Usage Limit A", "Usage Limit B"]

    # ------------------------------
    # --       COLLECTIONS        --
    # ------------------------------

    ParameterEvolution:
      type: object
      properties:
        dates:
          type: array
          items:
            type: string
            format: date-time
        values:
          type: array
          items:
            type: number

    CollectionDataStat:
      type: object
      properties:
        min:
          type: number
        max:
          type: number
        data:
          type: array
          items:
            $ref: '#/components/schemas/ParameterEvolution'

    PublicPricingCollection:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        numberOfPricings:
          type: number
        owner:
          type: object
          properties:
            id:
              type: string
              example: 63f74bf8eeed64058364b52e
            username:
              type: string
              example: "john_doe"
            avatar:
              type: string
              format: uri
              example: https://sphere.score.us.es/static/avatars/users/default-avatar.png

    PricingCollection:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        owner:
          type: string
          description: Username of the owner of the collection
          example: "john_doe"
        private:
          type: boolean
          default: false
        analytics:
          type: object
          properties:
            evolutionOfPlans:
              $ref: '#/components/schemas/ParameterEvolution'
            evolutionOfFeatures:
              $ref: '#/components/schemas/ParameterEvolution'
            evolutionOfAddOns:
              $ref: '#/components/schemas/ParameterEvolution'
            evolutionOfConfigurationSpaceSize:
              $ref: '#/components/schemas/ParameterEvolution'
    
    PricingCollectionWithPricings:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        owner:
          type: string
          description: Username of the owner of the collection
          example: "john_doe"
        private:
          type: boolean
          default: false
        analytics:
          type: object
          properties:
            evolutionOfPlans:
              $ref: '#/components/schemas/ParameterEvolution'
            evolutionOfFeatures:
              $ref: '#/components/schemas/ParameterEvolution'
            evolutionOfAddOns:
              $ref: '#/components/schemas/ParameterEvolution'
            evolutionOfConfigurationSpaceSize:
              $ref: '#/components/schemas/ParameterEvolution'
        data:
          type: object
          properties:
            minPrice:
              $ref: '#/components/schemas/CollectionDataStat'
            maxPrice:
              $ref: '#/components/schemas/CollectionDataStat'
            configurationSpaceSize:
              $ref: '#/components/schemas/CollectionDataStat'
            pricings:
              type: array
              items:
                $ref: '#/components/schemas/Pricing'

        # ------------------------------
    # --      ORGANIZATIONS       --
    # ------------------------------

    Organization:
      type: object
      description: |
        Represents an organization in the SPHERE platform. Organizations group users
        together and can own pricings and collections. Each user is automatically assigned
        a personal organization upon registration.
      required:
        - id
        - name
        - displayName
        - isPersonal
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique MongoDB ObjectId identifier of the organization
          example: "68050bd09890322c57842f6f"
        name:
          type: string
          description: |
            URL-safe unique identifier for the organization. Must be 3-50 characters,
            lowercase letters, digits, hyphens, and underscores only. Cannot be changed
            after creation. For personal organizations, this is set to the owner's username.
          example: "acme-corp"
          minLength: 3
          maxLength: 50
          pattern: '^[a-z0-9_-]+$'
        displayName:
          type: string
          description: Human-readable name for the organization (max 255 characters)
          example: "Acme Corporation"
          maxLength: 255
        description:
          type: string
          nullable: true
          description: Optional free-text description of the organization
          example: "The leading provider of SaaS solutions"
        avatar:
          type: string
          nullable: true
          description: URL to the organization's avatar image
          example: "https://sphere.score.us.es/static/avatars/orgs/org-avatar.png"
        isPersonal:
          type: boolean
          description: |
            Whether this is a personal organization. Personal organizations are
            automatically created for each user and cannot be deleted.
          default: false
          example: false
        createdAt:
          $ref: '#/components/schemas/Date'
        updatedAt:
          $ref: '#/components/schemas/Date'

    OrganizationMember:
      type: object
      description: |
        Represents a user's membership in an organization. Returned by the members listing
        endpoint with enriched user data (via aggregation pipeline join with the users collection).
      required:
        - id
        - role
        - joinedAt
      properties:
        id:
          type: string
          description: Unique MongoDB ObjectId of the membership record (not the user or organization)
          example: "68050bd09890322c57842f70"
        role:
          type: string
          enum: [OWNER, ADMIN, MEMBER]
          description: |
            The member's role within the organization:
            - **OWNER**: Full control over the organization, can manage members, invitations, and settings
            - **ADMIN**: Can manage members and invitations, but cannot delete the organization
            - **MEMBER**: Basic access, can view organization resources
          example: "ADMIN"
        joinedAt:
          $ref: '#/components/schemas/Date'
        user:
          type: object
          description: |
            Basic user information for the member. Included when listing members via the
            aggregation pipeline that joins membership records with the users collection.
          properties:
            id:
              type: string
              description: The user's MongoDB ObjectId
              example: "68050bd09890322c57842f71"
            username:
              type: string
              description: The user's unique username
              example: "johndoe"
            email:
              type: string
              format: email
              description: The user's email address
              example: "johndoe@example.com"
            avatar:
              type: string
              nullable: true
              description: URL to the user's avatar image
              example: "https://sphere.score.us.es/static/avatars/users/default-avatar.png"

    OrganizationInvitation:
      type: object
      description: |
        Represents an invitation to join an organization. Invitations are created by
        OWNER or ADMIN members and generate a unique code that can be shared with users.
        Users join via `POST /orgs/join/{code}` and are always assigned the `MEMBER` role.
      required:
        - id
        - code
        - useCount
        - createdAt
      properties:
        id:
          type: string
          description: Unique MongoDB ObjectId of the invitation
          example: "68050bd09890322c57842f72"
        code:
          type: string
          description: |
            Unique invitation code (10-character hex string) generated via
            `crypto.randomBytes(5).toString('hex')`. This is the code users provide
            to join the organization.
          example: "a1b2c3d4e5"
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: |
            When the invitation expires. `null` means the invitation never expires.
            Default is 7 days from creation if not specified.
          example: "2025-12-31T23:59:59Z"
        maxUses:
          type: number
          nullable: true
          description: |
            Maximum number of times this invitation can be accepted. `null` means
            unlimited uses. Once `useCount` reaches `maxUses`, the invitation can
            no longer be used.
          example: 10
        useCount:
          type: number
          description: |
            How many times this invitation has been accepted. Incremented atomically
            each time a user joins via this invitation.
          example: 3
        createdAt:
          $ref: '#/components/schemas/Date'

    OrganizationInvitationPreview:
      type: object
      description: |
        Preview of an organization invitation, returned by the `GET /orgs/invitations/preview/{code}`
        endpoint. Contains the full invitation details along with basic organization information
        so users can see which organization they'll be joining before accepting.
      properties:
        invitation:
          $ref: '#/components/schemas/OrganizationInvitation'
        organization:
          type: object
          description: |
            Basic organization information visible in the invitation preview. Includes
            enough detail for users to identify the organization before deciding to join.
          properties:
            id:
              type: string
              description: The organization's MongoDB ObjectId
              example: "68050bd09890322c57842f6f"
            name:
              type: string
              description: The organization's unique URL-safe name
              example: "acme-corp"
            displayName:
              type: string
              description: The organization's human-readable name
              example: "Acme Corporation"
            avatar:
              type: string
              nullable: true
              description: URL to the organization's avatar image
              example: "https://sphere.score.us.es/static/avatars/orgs/org-avatar.png"
            isPersonal:
              type: boolean
              description: Whether this is a personal organization
    
    # ------------------------------
    # --          ERRORS          --
    # ------------------------------

    FieldValidationError:
      type: object
      properties:
        type:
          type: string
          example: field
        msg:
          type: string
          example: Password must be a string
        path:
          type: string
          example: password
        location:
          type: string
          example: body
        value:
          example: invalid
      required:
        - type
        - msg
        - path
        - location

  requestBodies:
    UserRegister:
      description: User registration object
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - username
              - password
              - firstName
              - lastName
              - email
              - phone
            properties:
              username:
                type: string
                minLength: 3
                maxLength: 30
                pattern: '^[a-zA-Z0-9_]+$'
                description: Unique username for the user (alphanumeric characters and underscores only)
                example: egegeg
              password:
                type: string
                minLength: 5
                description: Password for the user account (minimum length of 5 characters)
                example: egegeg
              firstName:
                type: string
                description: User's first name
                example: egeg
              lastName:
                type: string
                description: User's last name
                example: egegeg
              email:
                type: string
                format: email
                description: User's email address (must be a valid email format)
                example: egeg@egeg.eg
              phone:
                type: string
                description: User phone number in international format
                example: "+34 666666666"
              address:
                type: string
                description: User address
                example: ""
    
    UserUpdate:
      description: User information update object
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
              role:
                $ref: '#/components/schemas/Role'
              firstName:
                type: string
              lastName:
                type: string
              email:
                type: string
                format: email
              phone:
                type: string
                nullable: true
              avatar:
                type: string
                nullable: true
                description: URI to the user's avatar (processed)
              address:
                type: string
                nullable: true
              postalCode:
                type: string
                nullable: true
              token:
                type: string
                nullable: true
              tokenExpiration:
                type: string
                format: date-time
                nullable: true
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
    
    PricingUpdate:
      description: Pricing metadata update object. (All fields are optional, but at least one must be provided)
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 1
                maxLength: 255
              owner:
                type: string
                minLength: 1
                maxLength: 255
              private:
                type: boolean
              _collectionId:
                type: string
                description: MongoDB ObjectId reference
              createdAt:
                type: string
