              analytics:
                type: object
                properties:
                  numberOfFeatures:
                    type: number
                  numberOfInformationFeatures:
                    type: number
                  numberOfIntegrationFeatures:
                    type: number
                  numberOfIntegrationApiFeatures:
                    type: number
                  numberOfIntegrationExtensionFeatures:
                    type: number
                  numberOfIntegrationIdentityProviderFeatures:
                    type: number
                  numberOfIntegrationWebSaaSFeatures:
                    type: number
                  numberOfIntegrationMarketplaceFeatures:
                    type: number
                  numberOfIntegrationExternalDeviceFeatures:
                    type: number
                  numberOfDomainFeatures:
                    type: number
                  numberOfAutomationFeatures:
                    type: number
                  numberOfBotAutomationFeatures:
                    type: number
                  numberOfFilteringAutomationFeatures:
                    type: number
                  numberOfTrackingAutomationFeatures:
                    type: number
                  numberOfTaskAutomationFeatures:
                    type: number
                  numberOfManagementFeatures:
                    type: number
                  numberOfGuaranteeFeatures:
                    type: number
                  numberOfSupportFeatures:
                    type: number
                  numberOfPaymentFeatures:
                    type: number
                  numberOfUsageLimits:
                    type: number
                  numberOfRenewableUsageLimits:
                    type: number
                  numberOfNonRenewableUsageLimits:
                    type: number
                  numberOfResponseDrivenUsageLimits:
                    type: number
                  numberOfTimeDrivenUsageLimits:
                    type: number
                  numberOfPlans:
                    type: number
                  numberOfFreePlans:
                    type: number
                  numberOfPaidPlans:
                    type: number
                  numberOfAddOns:
                    type: number
                  numberOfReplacementAddons:
                    type: number
                  numberOfExtensionAddons:
                    type: number
                  configurationSpaceSize:
                    type: number
                  minSubscriptionPrice:
                    type: number
                  maxSubscriptionPrice:
                    type: number
            example:
              name: "Zoom"

    CollectionCreate:
      description: Collection creation object
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                description: Name of the collection to be created
                example: "MyCollection"
              description:
                type: string
                description: Description of the collection to be created
                example: "This is my collection of pricings for video conferencing tools."
              private:
                type: boolean
                description: Whether the collection to be created should be private or not
                default: false
              pricings:
                type: array
                description: List of pricing names to be added to the collection upon creation
                items:
                  type: string
                example: ["Zoom", "Google Meet"]

    CollectionBulkCreate:
      description: Collection bulk creation object
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
              - zip
            properties:
              name:
                type: string
                description: Name of the collection to be created
                example: "MyCollection"
              description:
                type: string
                description: Description of the collection to be created
                example: "This is my collection of pricings for video conferencing tools."
              private:
                type: boolean
                description: Whether the collection to be created should be private or not
                default: false
              zip:
                type: string
                format: binary
                description: |
                  **Zip archive containing the pricing definitions to be added to the collection upon creation.**

                  The archive must follow the directory structure defined below:

                  {saasName}/
                  ├── {version}.yaml
                  └── {version}.yml

                  - Each top-level directory (`{saasName}`) represents a distinct pricing entity (e.g., a Software as a Service offering).
                  - Inside each directory, each file represents a specific version of that pricing.
                  - File names must correspond to the version identifier (e.g., `1.0.0.yaml`).
                  - Each file must contain a valid pricing definition encoded in YAML format.

                  **Constraints:**
                  - Only `.yaml` or `.yml` files are supported.
                  - The version identifier must be unique within each `{saasName}` directory.
                  - The YAML content must conform to the expected pricing schema.
  
    CollectionUpdate:
      description: Collection metadata update object. (All fields are optional, but at least one must be provided)
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: Name of the collection
                example: "MyCollection"
              description:
                type: string
                description: Description of the collection
                example: "This is my collection of pricings for video conferencing tools."
              owner:
                type: string
                description: New owner's username for the collection
                example: "john_doe"
              private:
                type: boolean
                description: Whether the collection should be private or not
                default: false
              analytics:
                type: object
                properties:
                  evolutionOfPlans:
                    $ref: '#/components/schemas/ParameterEvolution'
                  evolutionOfFeatures:
                    $ref: '#/components/schemas/ParameterEvolution'
                  evolutionOfAddOns:
                    $ref: '#/components/schemas/ParameterEvolution'
                  evolutionOfConfigurationSpaceSize:
                    $ref: '#/components/schemas/ParameterEvolution'



    CacheSetRequest:
      description: Request object for setting a value in the cache
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - key
              - value
            properties:
              key:
                type: string
                description: The cache key under which to store the value
                example: "user_preferences_123"
              value:
                type: object
                description: The value to store. Can be any JSON-serializable object
                example: { "theme": "dark", "language": "es", "notifications": true }
              expirationInSeconds:
                type: integer
                description: Optional expiration time in seconds. If not provided, defaults to 300 seconds (5 minutes)
                minimum: 1
                example: 3600

    OrganizationCreate:
      description: |
        Request body for creating a new organization. The authenticated user becomes
        the OWNER of the created organization.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: |
                  URL-safe unique identifier for the organization. Required unless
                  `isPersonal` is `true` (in which case it is auto-set to the user's
                  username). Must be 3-50 characters, lowercase letters, digits, hyphens,
                  and underscores only. Must be unique across the platform.
                example: "acme-corp"
                minLength: 3
                maxLength: 50
                pattern: '^[a-z0-9_-]+$'
              displayName:
                type: string
                description: Human-readable name for the organization (required, max 255 chars)
                example: "Acme Corporation"
                maxLength: 255
              description:
                type: string
                nullable: true
                description: Optional free-text description of the organization
                example: "The leading provider of SaaS solutions"
              avatarUrl:
                type: string
                nullable: true
                format: uri
                description: Optional URL to the organization's avatar image (must be a valid URL)
                example: "https://sphere.score.us.es/static/avatars/orgs/org-avatar.png"
              isPersonal:
                type: boolean
                description: |
                  Whether this is a personal organization. When `true`, the `name` field
                  is automatically overridden with the authenticated user's username.
                  Personal organizations cannot be deleted.
                default: false
                example: false

    OrganizationUpdate:
      description: |
        Request body for updating organization metadata. All fields are optional, but at
        least one should be provided. The `name` field cannot be changed after creation.
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              displayName:
                type: string
                description: Updated human-readable name for the organization (max 255 chars)
                example: "Acme Corporation Updated"
                maxLength: 255
              description:
                type: string
                nullable: true
                description: Updated description (set to `null` to clear)
                example: "Updated description"
              avatarUrl:
                type: string
                nullable: true
                format: uri
                description: Updated avatar URL (must be a valid URL, set to `null` to clear)
                example: "https://sphere.score.us.es/static/avatars/orgs/new-avatar.png"

    AddMember:
      description: |
        Request body for adding a user to an organization. Unlike `POST /orgs/join/{code}`
        (which always assigns `MEMBER` role), this endpoint allows assigning any role.
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - userId
              - role
            properties:
              userId:
                type: string
                description: The MongoDB ObjectId of the user to add as a member
                example: "68050bd09890322c57842f71"
              role:
                type: string
                enum: [OWNER, ADMIN, MEMBER]
                description: |
                  The role to assign to the new member:
                  - **OWNER**: Full control over the organization
                  - **ADMIN**: Can manage members and invitations
                  - **MEMBER**: Basic access to organization resources
                example: "MEMBER"

    UpdateMemberRole:
      description: |
        Request body for changing a member's role within the organization. The system
        automatically recalculates an internal role weight used for sorting.
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - role
            properties:
              role:
                type: string
                enum: [OWNER, ADMIN, MEMBER]
                description: |
                  The new role to assign to the member:
                  - **OWNER**: Full control over the organization
                  - **ADMIN**: Can manage members and invitations
                  - **MEMBER**: Basic access to organization resources
                example: "ADMIN"

    CreateInvitation:
      description: |
        Request body for creating an organization invitation. All fields are optional.
        The invitation code is auto-generated as a 10-character hex string.
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              expiresInDays:
                type: integer
                description: |
                  Number of days until the invitation expires. Default is 7 days.
                  Must be a positive integer. The expiration is calculated from the
                  current timestamp.
                minimum: 1
                example: 7
              maxUses:
                type: integer
                description: |
                  Maximum number of times this invitation can be accepted. Default is
                  `null` (unlimited). Once the limit is reached, the invitation can no
                  longer be used.
                minimum: 1
                example: 10

  responses:
    PricingList:
      description: A list of pricings matching the provided filter
      content:
        application/json:
          schema:
            type: object
            properties:
              total:
                type: integer
                description: Total number of pricings matching the provided filter (without pagination)
                example: 250
              minPrice:
                type: object
                description: Minimum price stats for the pricings matching the provided filter (without pagination)
                properties:
                  min:
                    type: number
                    description: The minimum min price amount used for filtering
                    example: 10.00
                  max:
                    type: number
                    description: The maximum min price amount used for filtering
                    example: 100.00
                  data:
                    type: object
                    description: An object containing the count of pricings for each min price amount (without pagination)
                    additionalProperties:
                      type: object
                      properties:
                        value:
                          type: string
                          description: Range of min price values
                          example: 10-20
                  percentileIndex:
                    type: number
                    example: 62
              maxPrice:
                type: object
                description: Maximum price stats for the pricings matching the provided filter (without pagination)
                properties:
                  min:
                    type: number
                    description: The minimum max price amount used for filtering
                    example: 10.00
                  max:
                    type: number
                    description: The maximum max price amount used for filtering
                    example: 100.00
                  data:
                    type: object
                    description: An object containing the count of pricings for each max price amount (without pagination)
                    additionalProperties:
                      type: object
                      properties:
                        value:
                          type: string
                          description: Range of max price values
                          example: 10-20
                  percentileIndex:
                    type: number
                    example: 62
              configurationSpaceSize:
                type: object
                description: Configuration space size stats for the pricings matching the provided filter (without pagination)
                properties:
                  min:
                    type: number
                    description: The minimum configuration space size used for filtering
                    example: 10.00
                  max:
                    type: number
                    description: The maximum configuration space size used for filtering
                    example: 100.00
                  data:
                    type: object
                    description: An object containing the count of pricings for each configuration space size (without pagination)
                    additionalProperties:
                      type: object
                      properties:
                        value:
                          type: string
                          description: Range of configuration space size values
                          example: 10-20
                  percentileIndex:
                    type: number
                    example: 62

              pricings:
                type: array
                items:
                  $ref: '#/components/schemas/Pricing'
    
    CollectionList:
      description: A list of pricing collections matching the provided filter
      content:
        application/json:
          schema:
            type: object
            properties:
              collections:
                type: array
                items:
                  $ref: '#/components/schemas/PublicPricingCollection'
              total:
                type: integer
                description: Total number of collections matching the provided filter (without pagination)
                example: 50
    
    UserCollectionList:
      description: A list of a user's pricing collections
      content:
        application/json:
          schema:
            type: object
            properties:
              collections:
                type: array
                items:
                  $ref: '#/components/schemas/PublicPricingCollection'

    UnprocessableEntity:
      description: Request sent could not be processed properly
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: '#/components/schemas/FieldValidationError'

    CacheGetResponse:
      description: Response object for getting a value from the cache
      content:
        application/json:
          schema:
            type: object
            description: Response from cache GET operation
            properties:
              data:
                type: object
                nullable: true
                description: The cached value, or null if key does not exist
                example: { "userId": "123", "preferences": { "theme": "dark" } }

    CacheSetResponse:
      description: Response object for setting a value in the cache
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Cache set successfully"
