openapi: 3.0.4

info:
  title: SPHERE API
  description: |
    # SPHERE - SaaS Pricing Holistic Evaluation and Regulation Environment

    SPHERE is a comprehensive platform designed to manage and regulate SaaS pricing models. This API allows you to programmatically interact with SPHERE's core functionalities, enabling seamless integration into your existing systems and workflows.

    The API enables you to:
    - **Save and manage multiple iPricings and their versions**
    - **Integrate with existing tooling in pricing-driven DevOps**
    - **Perform pricing intelligence analysis**

    ## Authentication Tokens

    SPHERE authentication system relies on auth tokens provided in the `Authorization` header as `<token>`. Here is some information about the purpose and usage of these tokens:

    - **Purpose**: Authenticate users and provide access to protected resources
    - **Obtaining**: Authenticate via `POST /users/login` endpoint with username/email and password
    - **Usage**: Include in `Authorization` header for requests. **DO NOT REQUIRE** `Bearer` prefix, just the token string.
    - **Accessible Roles**: `ADMIN` (full access), `USER` (access limited to own account and organizations)

    ## Roles

    Users in SPHERE can have the following roles:

    | Role          | Permissions |
    |---------------|-------------|
    | **ADMIN**     | Can perform any operation, over any user/resource allocated in SPHERE |
    | **USER**      | can perform operations on their own accounts and resources, while retaining read access to all resources. They are not permitted to manage other users’ accounts or resources |

    ## Permission Summary by Endpoint Category

    All endpoints require an `Authorization` header unless explicitly marked as **Public**. Here is a summary of the auth tags that are going to be used throughout this documentation:

    - **Public**: No authentication required
    - **ADMIN Role**: Requires user token with ADMIN role
    - **USER Role**: Requires user token with USER role (or ADMIN)

