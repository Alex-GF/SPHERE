externalDocs:
  description: "SPHERE: SaaS Pricing Holistic Evaluation and Regulation Environment"
  url: https://sphere.score.us.es/

servers:
  # - url: 'https://api.space.es/api/v1'
  #   description: Production
  - url: 'http://localhost:3000/api/v1'
    description: Development (local)

tags:
  - name: Authentication
    description: User authentication and API key management
  - name: Users
    description: User account management
  - name: Pricings
    description: Pricing Version Control System (PVCS)
  - name: Collections
    description: Collection management for grouping pricings


  - name: Organizations
    description: Organization management (User API Key only)
  - name: Services
    description: Service and pricing management (both API key types)
  - name: Contracts
    description: Subscription contract management (both API key types)
  - name: Features
    description: Feature evaluation and toggle management (Org API Key only)
  - name: Analytics
    description: System usage analytics (User ADMIN or Org Key with MANAGEMENT)
  - name: Cache
    description: Cache management (User ADMIN only)
  - name: Events
    description: WebSocket event management (Public)
  - name: Healthcheck
    description: Service health verification (Public)

paths:
  /users/login:
    post:
      summary: Authenticate user and obtain API Key
      description: |
        Authenticates a user with username/email and password and returns a User token 
        that can be used for subsequent authenticated requests.

        **Authentication**: Public
        
        **Returns**: User's token

      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: User credentials
              properties:
                loginField:
                  $ref: '#/components/schemas/LoginField'
                password:
                  $ref: '#/components/schemas/Password'
              required:
                - loginField
                - password
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    $ref: '#/components/schemas/ApiToken'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Invalid credentials

  /users/{username}:
    get:
      summary: Get user details by username
      description: |
        Retrieves detailed information about the user associated with the provided username.

        **IMPORTANT:** If you retrieve information about a user other than yourself, you will only be able to see public information UNLESS you have ADMIN privileges.

        **Authentication**: User token

        **Permission**: Any authenticated user can access their own details using this endpoint, regardless of role. This is the recommended endpoint for users to retrieve their own information without needing ADMIN privileges.

      tags:
        - Users
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PublicUser'
                  - $ref: '#/components/schemas/User'
        '401':
          description: Authentication required
        '404':
          description: User not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update user
      description: |
        Updates a user's information.

        **Authentication**: User API Key

        **Permission**: 
        - USER: can update ONLY their own account data.
        - ADMIN: can update ANY user data.

      tags:
        - Users
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/requestBodies/UserUpdate'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete user
      description: |
        Deletes a user account.

        **Authentication**: User API Key

        **Permission**: Only ADMIN users can delete other accounts

        **Cascading Actions**:
        - User's token is invalidated

        **Constraints**:
        - Cannot delete the last ADMIN user in the system

      tags:
        - Users
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
      responses:
        '204':
          description: User deleted
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{username}/updateToken:
    put:
      summary: Regenerate user's token
      description: |
        Generates a new User API Token for the specified user. This immediately invalidates 
        any previous API token for that user.

        **Authentication**: ADMIN Role

      tags:
        - Users
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
      responses:
        '200':
          description: API Token regenerated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    $ref: '#/components/schemas/ApiToken'
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /pricings:
    get:
      summary: Get and filter pricings
      description: |
        Retrieves a paginated list of PUBLIC pricings that match the provided filter.

        **Authentication**: User token

      tags:
        - Pricings
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/SortByPricings'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/MinSubscription'
        - $ref: '#/components/parameters/MaxSubscription'
        - $ref: '#/components/parameters/MinMinPrice'
        - $ref: '#/components/parameters/MaxMinPrice'
        - $ref: '#/components/parameters/MinMaxPrice'
        - $ref: '#/components/parameters/MaxMaxPrice'
        - $ref: '#/components/parameters/SelectedOwners'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/responses/PricingList'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    put:
      summary: Update pricing version
      description: |
        Receives a plain text YAML file containing an iPricing in Pricing2Yaml and updates its syntaxVersion to the latest Pricign2Yaml syntax version. 
        
        **Authentication**: User API Key

      tags:
        - Pricings
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pricing:
                  type: string
                  description: Plain text YAML content of the pricing definition to be updated
                  example: |-
                    saasName: Your SaaS Name
                    syntaxVersion: "3.0"
                    version: "latest"
                    createdAt: 2026-04-26
                    billing:
                      monthly: 1
                    currency: EUR
                    features:
                      feature1:
                        description: Feature 1 description
                        valueType: BOOLEAN
                        defaultValue: true
                        type: DOMAIN
                    usageLimits: null
                    plans:
                      BASIC:
                        description: Basic plan
                        price: 0.0
                        unit: user/month
                        features: null
                        usageLimits: null
                    addOns: null

      responses:
        '200':
          description: Pricing Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pricing'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /pricings/{username}:
    get:
      summary: Get all pricings from a user.
      description: |
        Retrieves a paginated list of a user's pricings.

        **Authentication**: User token

        **Permission**: 
        - USER: can list all their pricings (PUBLIC, PRIVATE) and PUBLIC pricings of other users.
        - ADMIN: can access any user's pricings.

      tags:
        - Pricings
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/SortByPricings'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/MinSubscription'
        - $ref: '#/components/parameters/MaxSubscription'
        - $ref: '#/components/parameters/MinMinPrice'
        - $ref: '#/components/parameters/MaxMinPrice'
        - $ref: '#/components/parameters/MinMaxPrice'
        - $ref: '#/components/parameters/MaxMaxPrice'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/responses/PricingList'
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create pricing for a given user.
      description: |
        Creates a new pricing for a given user.

        **Authentication**: User API Key

        **Permission**: 
        - USER: can create pricings for their own account.
        - ADMIN: can create pricings for any user.

      tags:
        - Pricings
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                yaml:
                  type: string
                  format: binary
                private:
                  type: boolean
                  default: false
                collectionId:
                  type: string
                  description: Optional collection ID to add the pricing to upon creation
      responses:
        '201':
          description: Pricing Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pricing'
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /pricings/{username}/{pricingName}:
    get:
      summary: Get public pricing details.
      description: |
        Retrieves a pricing by name for a given user. If the user requesting is the owner of the pricing, they can then access private pricings. Otherwise, only public ones.

        **Authentication**: User token

        **Permission**: 
        - USER: can access their own pricings (PUBLIC, PRIVATE) and PUBLIC pricings of other users.
        - ADMIN: can access any user's pricings.

      tags:
        - Pricings
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/PricingName'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingDetails'
        '403':
          description: Insufficient permissions
        '404':
          description: User or pricing not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
    put:
      summary: Update metadata of a pricing.
      description: |
        Updates the metadata of all pricing versions of a given pricing.

        **Authentication**: User API Key

        **Permission**: 
        - USER: can update their own pricings.
        - ADMIN: can update any pricing.
      tags:
        - Pricings
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/PricingName'
      requestBody:
        $ref: '#/components/requestBodies/PricingUpdate'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingDetails'
        '403':
          description: Insufficient permissions
        '404':
          description: User or pricing not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
    # TODO: Seguir aquí
    delete:
      summary: Delete a pricing.
      description: |
        Deletes all versions of a given pricing.

        **Authentication**: User API Key

        **Permission**: 
        - USER: can delete their own pricings.
        - ADMIN: can delete any pricing.

      tags:
        - Pricings
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/Username'
        - $ref: '#/components/parameters/PricingName'
      responses:
        '200':
          description: Operation Completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Pricing deleted successfully
        '403':
          description: Insufficient permissions
        '404':
          description: User or pricing not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /healthcheck:
    get:
      summary: Service health check
      description: |
        Verifies that the SPACE API service is operational and responsive. 
        Use this endpoint for load balancer health checks.

        **Authentication**: Public (no API key required)

      tags:
        - Healthcheck
      responses:
        '200':
          description: Service is operational
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Service is up and running!

components:
  schemas:

    # ------------------------------
    # --          FIELDS          --
    # ------------------------------

    ApiToken:
      type: string
      description: User API token for authentication in subsequent requests
      example: 9f3a7c2b1e8d4a6f0c5b2e9a7d1f3c8b4a6e2d1c

    Username:
      type: string
      description: Unique username for the user
      example: johndoe
      minLength: 3
      maxLength: 30
      pattern: '^[a-zA-Z0-9_]+$'

    LoginField:
      type: string
      description: Username or email of the user
      example: johndoe | john.doe@example.com
      minLength: 3
      maxLength: 80

    Password:
      type: string
      description: Password of the user
      example: j0hnD03
      minLength: 5

    Role:
      type: string
      description: Role of the user
      enum: [ADMIN, USER]
      example: USER

    Date:
      type: string
      format: date-time
      description: Date in UTC
      example: '2025-12-31T00:00:00Z'

    ObjectId:
      type: string
      description: ObjectId of the corresponding MongoDB document
      example: 68050bd09890322c57842f6f
      pattern: '^[a-f0-9]{24}$'
      readOnly: true
    
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    
    Name:
      type: string
      description: Name of an entity (e.g. pricing definition name)
      example: Zoom

    SortByPricings:
      type: string
      description: Field to sort pricings by
      enum: [name, configurationSpaceSize, featuresCount, usageLimitsCount, plansCount, addOnsCount, minPrice, maxPrice]
      example: name
    
    Sort:
      type: string
      description: Sort order for listing endpoints. Will take "desc" as value by default.
      enum: [asc, desc]
      example: asc

    MinSubscription:
      type: number
      description: Minimum subscription price for a pricing (used for sorting and filtering)
      example: 9.99

    MaxSubscription:
      type: number
      description: Maximum subscription price for a pricing (used for sorting and filtering)
      example: 99.99

    MinMinPrice:
      type: number
      description: Minimum price for a pricing's cheapest subscription (used for sorting and filtering)
      example: 4.99

    MaxMinPrice:
      type: number
      description: Maximum price for a pricing's cheapest subscription (used for sorting and filtering)
      example: 99.99

    MinMaxPrice:
      type: number
      description: Minimum price for a pricing's most expensive subscription (used for sorting and filtering)
      example: 19.99

    MaxMaxPrice:
      type: number
      description: Maximum price for a pricing's most expensive subscription (used for sorting and filtering)
      example: 199.99

    SelectedOwners:
      type: array
      description: List of selected pricing definition owners for filtering
      items:
        type: string
      example: ["agarcia29", "john_doe", "sphere"]

    Limit:
      type: number
      description: A numeric limit value for a list provided by a GET request
      example: 100
    
    Offset:
      type: number
      description: A numeric offset value for a list provided by a GET request
      example: 2



    # ------------------------------
    # --           USERS          --
    # ------------------------------

    PublicUser:
      type: object
      required:
        - username
        - avatar
      properties:
        username:
          type: string
        avatar:
          type: string
          nullable: true
          description: URI to the user's avatar (processed)

    User:
      type: object
      required:
        - username
        - avatar
        - role
        - firstName
        - lastName
        - email
        - createdAt
        - updatedAt
      properties:
        username:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
          description: URI to the user's avatar (processed)
        address:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        token:
          type: string
          nullable: true
        tokenExpiration:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ------------------------------
    # --         PRICINGS         --
    # ------------------------------

    Pricing:
      type: object
      properties:
        name:
          type: string
        owner:
          type: string
        collectionName:
          type: string
          description: Name of the pricing collection to which this pricing belongs
          example: "MyCollection"
        version:
          type: string
          description: Any string representing the version of the pricing definition (e.g. "1.0", "2.1.3", "2024-09-30")
          example: "1.0.0"
        createdAt:
          $ref: '#/components/schemas/Date'
        currency:
          type: string
          description: ISO 4217 currency code for the pricing definition
          example: "USD"
        analytics:
          type: object
          nullable: true
          properties:
            numberOfFeatures:
              type: integer
              example: 10
            numberOfPlans:
              type: integer
              example: 3
            numberOfAddOns:
              type: integer
              example: 2
            configurationSpaceSize:
              type: number
              example: 120
            minSubscriptionPrice:
              type: number
              example: 9.99
            maxSubscriptionPrice:
              type: number
              example: 199.99

    PricingDetails:
      type: object
      properties:
        name:
          type: string
          description: Common name of all pricing versions
        collectionName:
          type: string
          description: Name of the pricing collection to which this pricing belongs
          example: "MyCollection"
        versions:
          type: array
          description: List of all versions of the pricing definition with their details
          items:
            $ref: '#/components/schemas/PricingVersion'

    PricingVersion:
      type: object
      properties:
        id:
          type: string
        version:
          type: string
          description: Any string representing the version of the pricing definition (e.g. "1.0", "2.1.3", "2024-09-30")
          example: "1.0.0"
        private:
          type: boolean
          default: false
        collectionName:
          type: string
          description: Name of the pricing collection to which this pricing belongs
          example: "MyCollection"
        createdAt:
          $ref: '#/components/schemas/Date'
        url:
          type: string
          format: uri
          nullable: true
        yaml:
          type: string
          description: Path of serialized pricing definition in YAML format
          example: "/pricings/zoom_1.0.0.yaml"
        owner:
          type: object
          properties:
            id:
              type: string
            username:
              type: string
              example: "john_doe"
        analytics:
          type: object
          nullable: true
          properties:
            numberOfFeatures:
              type: integer
            numberOfInformationFeatures:
              type: integer
            numberOfIntegrationFeatures:
              type: integer
            numberOfIntegrationApiFeatures:
              type: integer
            numberOfIntegrationExtensionFeatures:
              type: integer
            numberOfIntegrationIdentityProviderFeatures:
              type: integer
            numberOfIntegrationWebSaaSFeatures:
              type: integer
            numberOfIntegrationMarketplaceFeatures:
              type: integer
            numberOfIntegrationExternalDeviceFeatures:
              type: integer
            numberOfDomainFeatures:
              type: integer
            numberOfAutomationFeatures:
              type: integer
            numberOfBotAutomationFeatures:
              type: integer
            numberOfFilteringAutomationFeatures:
              type: integer
            numberOfTrackingAutomationFeatures:
              type: integer
            numberOfTaskAutomationFeatures:
              type: integer
            numberOfManagementFeatures:
              type: integer
            numberOfGuaranteeFeatures:
              type: integer
            numberOfSupportFeatures:
              type: integer
            numberOfPaymentFeatures:
              type: integer
            numberOfUsageLimits:
              type: integer
            numberOfRenewableUsageLimits:
              type: integer
            numberOfNonRenewableUsageLimits:
              type: integer
            numberOfResponseDrivenUsageLimits:
              type: integer
            numberOfTimeDrivenUsageLimits:
              type: integer
            numberOfPlans:
              type: integer
            numberOfFreePlans:
              type: integer
            numberOfPaidPlans:
              type: integer
            numberOfAddOns:
              type: integer
            numberOfReplacementAddons:
              type: integer
            numberOfExtensionAddons:
              type: integer
            configurationSpaceSize:
              type: number
            minSubscriptionPrice:
              type: number
            maxSubscriptionPrice:
              type: number

    # ------------------------------
    # --          ERRORS          --
    # ------------------------------

    FieldValidationError:
      type: object
      properties:
        type:
          type: string
          example: field
        msg:
          type: string
          example: Password must be a string
        path:
          type: string
          example: password
        location:
          type: string
          example: body
        value:
          example: invalid
      required:
        - type
        - msg
        - path
        - location

  requestBodies:
    UserUpdate:
      description: User information update object
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
              role:
                $ref: '#/components/schemas/Role'
              firstName:
                type: string
              lastName:
                type: string
              email:
                type: string
                format: email
              phone:
                type: string
                nullable: true
              avatar:
                type: string
                nullable: true
                description: URI to the user's avatar (processed)
              address:
                type: string
