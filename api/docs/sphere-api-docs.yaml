openapi: 3.0.4

info:
  title: SPHERE API
  description: |
    # SPHERE - SaaS Pricing Holistic Evaluation and Regulation Environment

    SPHERE is a comprehensive platform designed to manage and regulate SaaS pricing models. This API allows you to programmatically interact with SPHERE's core functionalities, enabling seamless integration into your existing systems and workflows.

    The API enables you to:
    - **Save and manage multiple iPricings and their versions**
    - **Integrate with existing tooling in pricing-driven DevOps**
    - **Perform pricing intelligence analysis**

    ## Authentication

    SPHERE supports two authentication methods:

    1. **User Token** (used by the SPHERE frontend):
       - Obtained via `POST /users/login` with username/email and password
       - Include it in `Authorization` header as `Bearer <token>` to authenticate requests
       - Tokens expire after 24h

    2. **API Key** (recommended for programmatic access):
       - Can be created and managed via the SPHERE UI
       - Include them in `x-api-key` header to authenticate requests
       - Can have scoped permissions per organization

    ---

    ## Permission System Overview

    SPHERE implements a **three-layer permission system** that provides granular access control:

    ### 1. User Roles (Global Level)

    Determines what a user can do across the entire platform:

    | Role   | Description |
    |--------|-------------|
    | **ADMIN** | Full platform access. Can perform any operation on any user or resource. Bypasses organization membership checks. |
    | **USER** | Standard user. Can only manage their own account, organizations they're members of, and resources within those organizations. |

    ### 2. Organization Roles (Within an Organization)

    Determines what a user can do within a specific organization. Organizations have a hierarchical structure where a parent organization can have child organizations.

    | Role | Permissions |
    |------|-------------|
    | **OWNER** | Full control: manage organization resources, members, invitations, settings, and delete the organization |
    | **ADMIN** | Everything an OWNER can do, but cannot delete the organization or downgrade OWNERs |
    | **MEMBER** | Read-only access to organization data and pricings |

    **Role Hierarchy Behavior:**
    - A user can have **different roles** in different organizations
    - Example: User A is MEMBER in org1, ADMIN in org2 (a child of org1), and has no access to org3

    ### 3. API Key Scopes

    API Keys can be created with limited permissions, even if the user has higher permissions in the organization. This is useful for integrating external tools with restricted access.

    | Scope | Effect |
    |-------|--------|
    | **ALL** | Full access to organization - same as user's actual org role. Also grants access to **children organizations** in the hierarchy. |
    | **MANAGEMENT** | Can perform management operations. Effective role is ADMIN for users with OWNER/ADMIN role, otherwise their actual role. This permission **does not extend to child organizations**. |
    | **VIEW** | Read-only access. Effective role is always MEMBER regardless of actual org role. This permission **does not extend to child organizations** |

    **Scope Intersection Example:**
    - User has OWNER role in org1; and org1 have two children: org2 and org3 (given that user is OWNER, they also have OWNER permissions in org2 and org3)
    - User creates API Key with VIEW scope for org1
    - When using the API Key, the effective role becomes MEMBER (read-only) and can **only operate over org1**.

    ---

    ## Authentication Flow

    1. Request arrives with either `Authorization: Bearer <token>` or `x-api-key: <key>`. 

        - **NOTE:** if token access is provided, the API key is ignored and the user token is used for authentication and permission checks.
        
    2. AuthMiddleware authenticates and populates `req.user`
    3. If accessing organization-scoped resources, `populateOrganizationContext` resolves:
       - The organization from the URL path
       - The user's actual role within that organization
       - For API Keys: the scope-limited effective role
    4. Permission check validates both user role AND org role (if required)

