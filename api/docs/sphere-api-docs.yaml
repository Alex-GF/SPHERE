        example: "68050bd09890322c57842f72"

    InvitationCode:
      name: code
      in: path
      required: true
      description: |
        The unique invitation code (10-character hex string) generated when the invitation
        was created. Used to preview or accept an invitation. This code is shareable and
        is included in the invitation join URL.
      schema:
        type: string
        example: "a1b2c3d4e5"

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        API Key for authentication. Two types are supported:
        - **User API Key** (format: `usr_*`): Obtained from `POST /users/login` endpoint.
          Provides access based on the user's role (ADMIN or USER).
        - **Organization API Key** (format: `org_*`): Created in organization settings.
          Provides access scoped to the organization's resources.

        Include the token directly in the `Authorization` header **without** a `Bearer` prefix.

