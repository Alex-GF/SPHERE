      in: path
      required: true
      description: |
        The MongoDB ObjectId of the organization. The middleware automatically resolves
        the organization context from this parameter — loading the organization and
        determining the authenticated user's role within it.
      schema:
        type: string
        example: "68050bd09890322c57842f6f"

    UserId:
      name: userId
      in: path
      required: true
      description: |
        The MongoDB ObjectId of the user. Used in member management endpoints to identify
        which user to add, update, or remove from an organization.
      schema:
        type: string
        example: "68050bd09890322c57842f71"

    InvitationId:
      name: invitationId
      in: path
      required: true
      description: |
